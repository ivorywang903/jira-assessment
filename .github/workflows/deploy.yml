name: CI & Supabase Deploy

on:
  push:
    branches: [main]

jobs:
  readme-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check README updated
        run: |
          CHANGED=$(git diff --name-only HEAD^ HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          NEEDS_README=$(echo "$CHANGED" | grep -E '^(src/|supabase/migrations/|\.github/workflows/|\.env\.example)' || true)
          README_CHANGED=$(echo "$CHANGED" | grep '^README.md' || true)

          if [ -n "$NEEDS_README" ] && [ -z "$README_CHANGED" ]; then
            echo "::warning::下列檔案有異動但 README.md 未更新，請確認是否需要補充說明："
            echo "$NEEDS_README" | while read f; do echo "::warning::  - $f"; done
          else
            echo "README check passed."
          fi

  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Check
        run: npm run build
        env:
          VITE_SUPABASE_URL:   ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON:  ${{ secrets.VITE_SUPABASE_ANON }}
          VITE_ADMIN_USERNAME: ${{ secrets.VITE_ADMIN_USERNAME }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.90.0

      - name: Link Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Database Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
